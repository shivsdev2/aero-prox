repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Clean trailing whitespace
        description: Trims trailing whitespace from all text files.
      - id: end-of-file-fixer
        name: Fix end-of-file newlines
        description: Ensures every file ends with exactly one newline.
      - id: check-yaml
        name: Check YAML syntax
        description: Validates YAML files for syntax errors.
      - id: check-added-large-files
        name: Check for large added files
        description: Prevents files larger than 500 KB from being committed.
        args: ["--maxkb=500"]
      - id: check-merge-conflict
        name: Check for merge conflict markers
        description: Detects leftover conflict markers in files.
      - id: check-toml
        name: Check TOML syntax
        description: Validates TOML files (e.g. pyproject.toml) for syntax errors.

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        name: Ruff linter
        description: Runs Ruff, a fast Python linter written in Rust.
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Ruff formatter
        description: Runs Ruff's built-in formatter (replaces Black).
